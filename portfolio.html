<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>portfolio — studio rjl</title>

<link rel="icon" type="image/png" href="favicon.png">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-PBJDD7VN3N"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-PBJDD7VN3N');

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@300&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#4c3b15;
  --gold:#806829;
  --text:#261e10;
  --ivory:#eae4da;
  --hover:#a36a29;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  cursor:none;
}

/* BASE */
body{
  background:var(--ivory);
  font-family:'Courier New', monospace;
  color:var(--text);
}

/* CURSOR */
.cursor{
  width:14px;height:14px;
  border-radius:50%;
  background:var(--primary);
  position:fixed;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9999;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:24px 40px;
  font-size:12px;
  background:rgba(234,228,218,0.6);
  backdrop-filter:blur(6px);
  z-index:10;
}

nav div:first-child{
  color:var(--gold);
}

nav a{
  margin-left:24px;
  text-decoration:none;
  color:var(--text);
}

nav a:hover{
  color:var(--hover);
  text-decoration:underline;
}

/* MOBILE NAV */
.hamburger {
  display:none;
  font-size:20px;
  cursor:pointer;
}

.nav-links{
  display:flex;
}

@media(max-width:768px){
  nav{
    padding:20px 24px;
    align-items:center;
  }

  .hamburger{
    display:block;
  }

  .nav-links{
    position:absolute;
    top:70px;
    right:20px;
    background:rgba(234,228,218,0.95);
    backdrop-filter:blur(10px);
    flex-direction:column;
    padding:20px;
    border-radius:10px;
    display:none;
    gap:18px;
  }

  .nav-links.active{
    display:flex;
  }

  .nav-links a{
    margin-left:0;
  }
}

/* HEADER */
.header{
  padding:140px 10% 40px;
  text-align:center;
}

.header h1{
  font-family:'Cormorant Infant', serif;
  font-weight:300;
  color:var(--gold);
  margin-bottom:10px;
}

.subline{
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
  min-height:16px;
}

/* FILTER */
.filter{
  margin-top:30px;
  position:relative;
  display:inline-block;
}

select{
  padding:10px 28px 10px 16px;
  border:1px solid rgba(0,0,0,0.15);
  background:transparent;
  font-family:'Courier New', monospace;
  font-size:12px;
  color:var(--text);
  appearance:none;
  cursor:pointer;
}

.filter::after{
  content:"▾";
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:10px;
}

/* GRID */
.portfolio{
  padding:40px 10% 120px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:60px;
}

.card{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.card.visible{
  opacity:1;
  transform:translateY(0);
}

.frame{
  background:var(--ivory);
  padding:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.frame img{
  width:100%;
  display:block;
  transition:transform .6s ease;
}

.card:hover img{
  transform:scale(1.03);
}

.meta{
  margin-top:10px;
  font-size:11px;
  opacity:.7;
}

.category{
  font-family:'Cormorant Infant', serif;
  color:var(--gold);
  display:block;
  margin-bottom:4px;
}

.tag{
  display:inline-block;
  margin:2px 4px 0 0;
  padding:2px 6px;
  font-size:10px;
  border:1px solid rgba(0,0,0,0.1);
}

/* ENQUIRY PANEL */
.enquiry-panel{
  position:fixed;
  top:0;
  right:-420px;
  width:420px;
  height:100vh;
  background:#eae4dc;
  box-shadow:-10px 0 30px rgba(0,0,0,0.08);
  transition:0.8s cubic-bezier(0.77,0,0.18,1);
  z-index:9998;
  overflow-y:auto;
}

.enquiry-panel.active{
  right:0;
}

.enquiry-close{
  position:absolute;
  top:18px;
  right:22px;
  cursor:pointer;
}

.enquiry-inner{
  padding:60px 40px;
}
</style>
</head>

<body>

<div class="cursor"></div>

<nav>
  <div>studio rjl</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="index.html#about">About</a>
    <a href="#" id="enquiryToggle">Inquire</a>
    <a href="booking.html">Book</a>
  </div>

  <div class="hamburger" id="hamburger">☰</div>
</nav>

<div class="header">
  <h1>portfolio</h1>
  <div class="subline" id="typeLine"></div>

  <div class="filter">
    <select id="filter">
      <option value="all">filter by project type</option>
      <option value="interiors">Interiors</option>
      <option value="property">Property</option>
      <option value="branding">Branding</option>
      <option value="packaging">Packaging</option>
      <option value="architecture">Architecture</option>
      <option value="concept">Concept</option>
    </select>
  </div>
</div>

<section class="portfolio">
  <div class="card" data-tags="interiors property">
    <div class="frame"><img src="interior-brandscape-design-warm-light.jpg"></div>
  </div>

  <div class="card" data-tags="branding packaging">
    <div class="frame"><img src="floral-monogram-brandmark.jpg"></div>
  </div>

  <div class="card" data-tags="architecture concept">
    <div class="frame"><img src="interior-brandscape-design-warm.jpg"></div>
  </div>
</section>

<!-- ENQUIRY PANEL -->
<div class="enquiry-panel" id="enquiryPanel">
  <div class="enquiry-close" id="enquiryClose">×</div>
  <div class="enquiry-inner">
    <h2>ENQUIRIES</h2>
  </div>
</div>

<script>
const cursor=document.querySelector('.cursor');

document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});

/* NAV */
const hamburger=document.getElementById('hamburger');
const navLinks=document.getElementById('navLinks');

hamburger.addEventListener('click',()=>{
  navLinks.classList.toggle('active');
});

/* FILTER */
const cards=document.querySelectorAll('.card');
const filter=document.getElementById('filter');

filter.addEventListener('change',()=>{
  const val=filter.value;
  cards.forEach(c=>{
    c.style.display =
      val==='all' || c.dataset.tags.includes(val)
      ? 'block' : 'none';
  });
});

/* REVEAL */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('visible');
  });
});

cards.forEach(c=>observer.observe(c));

/* ENQUIRY */
const enquiryToggle=document.getElementById('enquiryToggle');
const enquiryPanel=document.getElementById('enquiryPanel');
const enquiryClose=document.getElementById('enquiryClose');

enquiryToggle.addEventListener('click',(e)=>{
  e.preventDefault();
  enquiryPanel.classList.toggle('active');
});

enquiryClose.addEventListener('click',()=>{
  enquiryPanel.classList.remove('active');
});

document.addEventListener('click',(e)=>{
  if(!enquiryPanel.contains(e.target) && !enquiryToggle.contains(e.target)){
    enquiryPanel.classList.remove('active');
  }
});
</script>

</body>
</html>
