<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio RJL</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4c3b15;
      --gold: #806829;
      --text: #261e10;
      --ivory: #eae4da;
      --deep-red: #451713;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    body {
      background: var(--ivory);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* Custom Cursor */
    .cursor {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary);
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      opacity: 0.9;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 24px 40px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      background: rgba(234, 228, 218, 0.6);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      margin-left: 24px;
    }

    /* Hero */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      letter-spacing: 2px;
    }

    .hero p {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      margin-top: 10px;
      opacity: 0.6;
    }

    /* Section */
    section {
      padding: 120px 10%;
    }

    /* Projects */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 40px;
    }

    .project {
      background: var(--ivory);
      border: 1px solid rgba(0,0,0,0.05);
      padding: 10px;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s ease;
    }

    .project img {
      width: 100%;
      display: block;
    }

    .caption {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      margin-top: 8px;
      opacity: 0.6;
    }

    .project.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* About */
    .about {
      max-width: 700px;
      margin: auto;
      text-align: center;
    }

    .about h2 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      margin-bottom: 20px;
    }

    .about p {
      line-height: 1.8;
      font-size: 15px;
    }

    .book {
