<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>studio rjl</title>

  <meta name="description" content="Studio RJL is a multidisciplinary design studio specialising in visual identity, creative direction and spatial storytelling.">

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PBJDD7VN3N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PBJDD7VN3N');
  </script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@400&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary:#4c3b15;
      --gold:#806829;
      --text:#261e10;
      --ivory:#eae4da;
      --dark:#261e10;
    }

    * {margin:0;padding:0;box-sizing:border-box;cursor:none;}

    body {
      background:var(--ivory);
      color:var(--text);
      font-family:'Courier New', monospace;
    }

    .cursor {
      width:14px;height:14px;border-radius:50%;
      background:var(--primary);
      position:fixed;pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:9999;
    }

    nav {
      position:fixed;top:0;width:100%;
      display:flex;justify-content:space-between;
      padding:24px 40px;font-size:12px;
      background:rgba(234,228,218,0.6);
      backdrop-filter:blur(6px);
    }

    nav a {margin-left:24px;text-decoration:none;color:var(--text);}

    .hero {
      height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
    }

    .signature {
      font-family:'Cormorant Infant', serif;
      font-size:20px;
      color:var(--gold);
      margin-bottom:30px;
    }

    .about-text h3 {
      font-family:'Cormorant Infant', serif;
      font-size:18px;
      color:var(--gold);
      margin-bottom:20px;
    }

    /* ENQUIRY PANEL */
    .enquiry-panel {
      position:fixed;top:0;right:-420px;width:420px;height:100vh;
      background:#eae4dc;
      transition:0.8s cubic-bezier(0.77,0,0.18,1);
      z-index:9998;
      overflow-y:auto;
    }

    .enquiry-panel.active { right:0; }

    .enquiry-inner { padding:60px 40px; }

    .enquiry-inner h2 {
      font-family:'Cormorant Infant', serif;
      font-size:20px;
    }

    .enquiry-inner input,
    .enquiry-inner select,
    .enquiry-inner textarea {
      width:100%;
      margin-top:6px;
      border:none;
      border-bottom:1px solid #261e10;
      background:transparent;
      font-family:'Courier New';
      font-size:11px;
    }

    .thank-you {
      opacity:0;
      transform:translateY(20px);
      transition:0.8s;
      text-align:center;
      margin-top:60px;
    }

    .thank-you.visible { opacity:1; transform:translateY(0); }

    .fade-out { opacity:0; }
  </style>
</head>

<body>

<div class="cursor"></div>

<nav>
  <div>studio rjl</div>
  <div>
    <a href="#">Portfolio</a>
    <a href="#">About</a>
    <a href="#">Book</a>
    <a href="#" id="enquiryToggle">Enquiries</a>
  </div>
</nav>

<div class="hero">
  <div>
    <div class="signature">design studio</div>
    <p>crafting bespoke brandscapes</p>
  </div>
</div>

<!-- ENQUIRY PANEL -->
<div class="enquiry-panel" id="enquiryPanel">
  <div class="enquiry-inner">

    <h2>ENQUIRIES</h2>
    <p>For all creative enquiries, please complete the form below and we will be in touch.</p>

    <form id="enquiryForm" action="https://formspree.io/f/mzdyagdr" method="POST">
      
      <label>Name*</label>
      <input type="text" name="name" required>

      <label>Service</label>
      <select name="service">
        <option>Art Direction</option>
        <option>Branding</option>
        <option>Content Templates</option>
        <option>Print Materials</option>
        <option>Digital Marketing</option>
        <option>Website Design</option>
        <option>Website Development</option>
        <option>Social Media</option>
      </select>

      <label>Company*</label>
      <input type="text" name="company" required>

      <label>Email*</label>
      <input type="email" name="email" required>

      <label>Phone</label>
      <input type="tel" name="phone">

      <label>Message</label>
      <textarea name="message" rows="4"></textarea>

      <button type="submit">Send</button>
    </form>

    <div class="thank-you" id="thankYouMessage">
      <h2>Thank you</h2>
      <p>Your message has been sent.<br><br>We’ll be in touch soon!</p>
    </div>

  </div>
</div>

<script>
const toggle = document.getElementById('enquiryToggle');
const panel = document.getElementById('enquiryPanel');
const form = document.getElementById('enquiryForm');
const thankYou = document.getElementById('thankYouMessage');

toggle.onclick = e => {
  e.preventDefault();
  panel.classList.toggle('active');
};

document.addEventListener('click', e => {
  if (!panel.contains(e.target) && !toggle.contains(e.target)) {
    panel.classList.remove('active');
  }
});

form.addEventListener('submit', async e => {
  e.preventDefault();

  const data = new FormData(form);

  const res = await fetch(form.action, {
    method:'POST',
    body:data,
    headers:{'Accept':'application/json'}
  });

  if(res.ok){
    form.classList.add('fade-out');
    setTimeout(()=>{
      form.style.display='none';
      thankYou.classList.add('visible');
    },500);
  }
});
</script>

</body>
</html>
