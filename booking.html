  <meta charset="UTF-8" />

  <title>Book — studio rjl</title>

  <!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4c3b15;
      --gold: #806829;
      --text: #261e10;
      --ivory: #eae4da;
      --dark: #261e10;
      --hover: #a36a29;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Courier New', monospace;
    }

    body {
      background: var(--ivory);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .light-leak {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.12), transparent 60%);
      pointer-events: none;
      opacity: 0.3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      opacity: 0.08;
      pointer-events: none;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: #fdfbf7;
      border-radius: 16px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      position: relative;
      z-index: 2;
    }

    h1 {
      font-family: 'Cormorant Infant', serif;
      font-style: italic;
      color: var(--gold);
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }

    p {
      text-align: center;
      font-size: 12px;
      line-height: 1.8;
      opacity: 0.75;
      margin-bottom: 40px;
    }

    iframe {
      width: 100%;
      height: 800px;
      border: none;
      border-radius: 10px;
      background: white;
    }

    /* Mobile Fix */
    @media (max-width: 600px) {
      body {
        padding: 20px 10px;
      }

      .container {
        padding: 30px 16px;
        border-radius: 10px;
      }

      iframe {
        height: 1000px; /* gives breathing room for scrolling */
      }
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 30px;
      font-size: 11px;
      color: var(--text);
      text-decoration: none;
      opacity: 0.6;
    }

    .back-link:hover {
      color: var(--hover);
      text-decoration: underline;
    }

  </style>
</head>

<body>

<div class="light-leak"></div>

<div class="container">

  <h1>Discovery Call</h1>

  <p>
    A complimentary 20 minute discovery call; a space to explore your brand.<br><br>
    We’ll walk through where you are, what’s asking to emerge,<br>
    and whether we’re aligned to create something meaningful together.
  </p>

  <a href="index.html" class="back-link">← return to studio</a>

</div>

</body>
</html>
